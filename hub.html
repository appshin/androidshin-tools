<!DOCTYPE html>
<html lang="ko">
<head>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2538545944696357" crossorigin="anonymous"></script>
<meta charset="UTF-8" />
<meta name="theme-color" content="#0a0e1a" />
<link rel="canonical" href="https://androidshin.dev/hub.html" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>appshin — 앱 모음</title>
<meta name="description" content="혼자 만드는 앱들. 골라서 써보세요." />
<meta property="og:title" content="appshin — 앱 모음 / My Apps" />
<meta property="og:description" content="혼자 만드는 앱들. 골라서 써보세요. / Apps I build solo." />
<meta property="og:type" content="website" />
<link rel="preconnect" href="https://cdn.jsdelivr.net" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<style>
  :root {
    --bg:#0a0e1a; --bg-2:#0d1322; --glass:rgba(255,255,255,.045); --glass-strong:rgba(255,255,255,.07);
    --border:rgba(255,255,255,.09); --border-strong:rgba(255,255,255,.16);
    --text:#eef2f8; --muted:#8a93a6; --faint:#5a6477;
    --aurora-1:#2dd4bf; --aurora-2:#7c5cfc; --aurora-3:#f472b6; --maxw:600px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{font-family:"Pretendard",-apple-system,"Apple SD Gothic Neo","Noto Sans KR",system-ui,sans-serif;
    background:var(--bg);color:var(--text);line-height:1.5;min-height:100vh;overflow-x:hidden;
    position:relative;-webkit-font-smoothing:antialiased;padding:0 20px 64px}
  .aurora{position:fixed;inset:0;z-index:-1;overflow:hidden;
    background:radial-gradient(120% 80% at 50% -10%,var(--bg-2) 0%,var(--bg) 60%)}
  .aurora span{position:absolute;border-radius:50%;filter:blur(70px);opacity:.45;will-change:transform}
  .aurora .a1{width:380px;height:380px;top:-120px;left:-80px;background:var(--aurora-1);animation:drift1 18s ease-in-out infinite}
  .aurora .a2{width:320px;height:320px;top:-60px;right:-100px;background:var(--aurora-2);animation:drift2 22s ease-in-out infinite}
  .aurora .a3{width:260px;height:260px;top:120px;left:40%;background:var(--aurora-3);opacity:.3;animation:drift3 26s ease-in-out infinite}
  @keyframes drift1{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(40px,30px) scale(1.1)}}
  @keyframes drift2{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-30px,40px) scale(1.08)}}
  @keyframes drift3{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(20px,-30px) scale(1.12)}}

  /* 언어 전환 바 */
  .langbar{position:fixed;top:14px;left:50%;transform:translateX(-50%);z-index:10;
    display:inline-flex;padding:4px;gap:2px;border-radius:999px;border:1px solid var(--border-strong);
    background:rgba(13,19,34,.72);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
    box-shadow:0 6px 22px rgba(0,0,0,.35)}
  .langbar button{border:none;cursor:pointer;font-family:inherit;font-size:13px;font-weight:700;
    color:var(--muted);background:transparent;padding:7px 16px;border-radius:999px;
    transition:color .15s ease,background .15s ease}
  .langbar button.active{color:#0a0e1a;background:linear-gradient(135deg,var(--aurora-1),var(--aurora-2))}

  .wrap{max-width:var(--maxw);margin:0 auto;padding-top:72px}
  .profile{text-align:center;margin-bottom:28px}
  .mark{width:76px;height:76px;margin:0 auto 16px;border-radius:22px;display:grid;place-items:center;
    font-size:30px;font-weight:800;letter-spacing:-.04em;color:#0a0e1a;
    background:linear-gradient(135deg,var(--aurora-1),var(--aurora-2) 55%,var(--aurora-3));
    box-shadow:0 8px 32px rgba(124,92,252,.35)}
  .profile h1{font-size:24px;font-weight:800;letter-spacing:-.03em}
  .profile .tag{color:var(--muted);font-size:15px;margin-top:6px}
  .profile .count{display:inline-block;margin-top:14px;font-size:12.5px;color:var(--muted);
    padding:5px 12px;border:1px solid var(--border);border-radius:999px;background:var(--glass)}

  .video-cta{display:flex;align-items:center;gap:12px;margin:0 0 22px;padding:15px 18px;
    border-radius:16px;border:1px solid var(--border-strong);text-decoration:none;color:var(--text);
    background:linear-gradient(135deg,rgba(45,212,191,.14),rgba(124,92,252,.14));
    box-shadow:0 6px 24px rgba(124,92,252,.16);transition:transform .14s,border-color .14s}
  .video-cta:hover{transform:translateY(-2px);border-color:var(--border-strong)}
  .video-cta .vi{width:42px;height:42px;flex:none;border-radius:12px;display:grid;place-items:center;
    font-size:20px;background:linear-gradient(135deg,var(--aurora-1),var(--aurora-2));color:#0a0e1a}
  .video-cta .vt{flex:1;min-width:0}
  .video-cta .vt b{display:block;font-size:15px;font-weight:800;letter-spacing:-.02em}
  .video-cta .vt span{display:block;font-size:12.5px;color:var(--muted);margin-top:2px}
  .video-cta .va{color:var(--muted);font-size:18px}
  .os-banner{display:none;margin:0 0 22px;padding:13px 16px;border-radius:14px;font-size:13.5px;
    line-height:1.45;border:1px solid var(--border);background:var(--glass);color:var(--muted)}
  .os-banner.show{display:block}
  .os-banner b{color:var(--text);font-weight:700}

  .section-label{font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
    color:var(--muted);margin:26px 4px 12px}

  .card{display:flex;align-items:center;gap:14px;width:100%;text-align:left;text-decoration:none;
    color:inherit;padding:14px 16px;margin-bottom:11px;border-radius:18px;border:1px solid var(--border);
    background:var(--glass);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
    position:relative;overflow:hidden;transition:transform .18s ease,border-color .18s ease,background .18s ease}
  .card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent,var(--aurora-2));opacity:.85}
  .card:hover,.card:focus-visible{transform:translateY(-2px);border-color:var(--border-strong);background:var(--glass-strong);outline:none}
  .card:focus-visible{box-shadow:0 0 0 2px var(--accent,var(--aurora-2))}
  .icon{flex:0 0 auto;width:50px;height:50px;border-radius:14px;display:grid;place-items:center;
    font-size:21px;font-weight:800;color:#fff;background:var(--accent,var(--aurora-2));
    box-shadow:0 4px 14px -4px var(--accent,var(--aurora-2))}
  .meta{flex:1 1 auto;min-width:0}
  .meta .name{font-size:16px;font-weight:700;letter-spacing:-.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .meta .desc{font-size:13px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .meta .pkg{font-family:ui-monospace,SFMono-Regular,"SF Mono",Menlo,monospace;font-size:10.5px;
    color:#57607a;margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .arrow{flex:0 0 auto;color:var(--muted);transition:transform .18s ease,color .18s ease}
  .card:hover .arrow{transform:translateX(3px);color:var(--text)}

  .card.featured{padding:18px;border-color:var(--border-strong);
    background:linear-gradient(135deg,rgba(244,114,182,.10),rgba(124,92,252,.10)),var(--glass-strong)}
  .card.featured::after{content:attr(data-badge);position:absolute;top:12px;right:14px;font-size:10.5px;
    font-weight:700;letter-spacing:.04em;color:var(--aurora-3);padding:3px 9px;border-radius:999px;
    border:1px solid rgba(244,114,182,.35);background:rgba(244,114,182,.08)}
  .card.featured .icon{width:58px;height:58px;border-radius:16px;font-size:24px}
  .card.featured .name{font-size:18px}
  .card.featured .desc{white-space:normal;font-size:13.5px}

  footer{text-align:center;margin-top:38px;font-size:12px;color:#4d5468}
  footer .dev{color:var(--muted)}
  footer .visits{display:inline-block;margin-bottom:12px;padding:6px 14px;border-radius:999px;
    border:1px solid var(--border);background:var(--glass);color:var(--muted);font-size:12.5px}
  footer a{color:var(--muted);text-decoration:none;border-bottom:1px solid var(--border)}
  @media (prefers-reduced-motion:reduce){.aurora span{animation:none!important}.card,.arrow{transition:none!important}}
</style>
</head>
<body>

<div class="aurora" aria-hidden="true"><span class="a1"></span><span class="a2"></span><span class="a3"></span></div>

<div class="langbar" role="group" aria-label="Language">
  <button id="btnKo" type="button">한국어</button>
  <button id="btnEn" type="button">English</button>
</div>

<main class="wrap">
  <header class="profile">
    <div class="mark" id="mark">a</div>
    <h1 id="pName"></h1>
    <p class="tag" id="pTag"></p>
    <span class="count" id="pCount"></span>
  </header>
  <a class="video-cta" id="videoCta" href="./videos.html"></a>
  <div class="os-banner" id="osBanner"></div>
  <div id="list"></div>
  <footer>
    <p class="visits" id="visits" hidden></p>
    <p class="dev" id="footDev"></p>
  </footer>
</main>

<script>
/* 앱 목록 — 한 앱당 한국어/영어 함께 */
const APPS = [
  { featured:true, cat:"featured", name_ko:"Second Memories", name_en:"Second Memories",
    desc_ko:"그리운 사람과 다시 나누는 대화", desc_en:"Talk again with someone you miss",
    pkg:"com.secondmemoriesserver", accent:"#f472b6" },
  { cat:"ai", name_ko:"Nuvio", name_en:"Nuvio",
    desc_ko:"마음을 들어주는 AI 상담", desc_en:"An AI that listens to your heart",
    pkg:"com.nuvio", accent:"#7c5cfc" },
  { cat:"ai", name_ko:"Sapio", name_en:"Sapio",
    desc_ko:"역사 속 위인과 배우는 AI 튜터", desc_en:"Learn from history\u2019s greatest minds",
    pkg:"com.appshin.sapio", accent:"#6366f1" },
  { cat:"ai", name_ko:"Everwise", name_en:"Everwise",
    desc_ko:"나만의 AI 멘토", desc_en:"Your personal AI mentor",
    pkg:"com.appshin.everwise", accent:"#3b82f6" },
  { cat:"game", name_ko:"뽁뽁이 BubblePop!", name_en:"BubblePop!",
    desc_ko:"순서대로 터뜨리는 뽁뽁이", desc_en:"Endlessly satisfying bubble wrap",
    pkg:"com.androidshin.bubblewrap", accent:"#2dd4bf" },
  { cat:"game", name_ko:"Bubble Connect 3D", name_en:"Bubble Connect 3D",
    desc_ko:"3D 버블 연결 퍼즐", desc_en:"A satisfying 3D bubble puzzle",
    pkg:"com.appshin.bubbleconnect3d", accent:"#14b8a6" },
  { cat:"tool", name_ko:"NeuroTap", name_en:"NeuroTap",
    desc_ko:"집중력 탭 트레이닝", desc_en:"Train your focus & reflexes",
    pkg:"com.appshin.neurotap", accent:"#a855f7" },
];

const I18N = {
  ko: {
    htmlLang:"ko", title:"appshin — 앱 모음",
    tagline:"혼자 만드는 앱들. 골라서 써보세요.",
    footer:"made by 신욱중 · appshin",
    count:(n)=>"앱 "+n+"개", featured:"추천", featuredBadge:"지금 추천",
    cats:{ai:"AI",game:"게임",tool:"도구"},
    videoTitle:"🎬 앱 소개 영상 보기", videoSub:"시인 시리즈부터 게임까지, 영상으로 만나보세요",
    iosBanner:"<b>iPhone에서 보고 계시네요.</b> 현재 모든 앱은 Android 전용이에요. 버튼을 누르면 Play 스토어 페이지가 열리지만 설치는 안드로이드 기기에서만 됩니다. iOS 버전은 준비 중이에요. 🙏",
    visits:(n)=>"방문자 "+n+"명",
  },
  en: {
    htmlLang:"en", title:"appshin — My Apps",
    tagline:"Apps I build solo. Take your pick.",
    footer:"made by Mr.AndroidShin · appshin",
    count:(n)=>n+" apps", featured:"Featured", featuredBadge:"Featured",
    cats:{ai:"AI",game:"Games",tool:"Tools"},
    videoTitle:"🎬 Watch app videos", videoSub:"From the poet series to games — see them in motion",
    iosBanner:"<b>You\u2019re on iPhone.</b> All apps are currently Android-only. Tapping opens the Play Store page, but installation works on Android devices only. iOS versions are in the works. 🙏",
    visits:(n)=>n+" visitors",
  },
};

function detectOS(){
  const ua=navigator.userAgent||navigator.vendor||"";
  if(/android/i.test(ua))return"android";
  if(/iPad|iPhone|iPod/.test(ua))return"ios";
  if(navigator.platform==="MacIntel"&&navigator.maxTouchPoints>1)return"ios";
  return"other";
}
const OS=detectOS();
const storeUrl=(pkg)=>"https://play.google.com/store/apps/details?id="+pkg;
const $=(id)=>document.getElementById(id);

function initialLang(){
  let saved=null;
  try{saved=localStorage.getItem("lang");}catch(e){}
  if(saved==="ko"||saved==="en")return saved;
  const nav=(navigator.language||"").toLowerCase();
  return nav.startsWith("ko")?"ko":"en";
}
let LANG=initialLang();
let visitCount=null;

function makeCard(app,t){
  const a=document.createElement("a");
  a.className="card"+(app.featured?" featured":"");
  a.href=storeUrl(app.pkg);a.target="_blank";a.rel="noopener";
  a.style.setProperty("--accent",app.accent);
  if(app.featured)a.setAttribute("data-badge",t.featuredBadge);
  const name=LANG==="ko"?app.name_ko:app.name_en;
  const desc=LANG==="ko"?app.desc_ko:app.desc_en;
  const initial=name.replace(/[^A-Za-z가-힣]/g,"").charAt(0)||"·";
  a.innerHTML=
    '<div class="icon">'+initial+'</div>'+
    '<div class="meta"><div class="name">'+name+'</div>'+
    '<div class="desc">'+desc+'</div><div class="pkg">'+app.pkg+'</div></div>'+
    '<svg class="arrow" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" '+
    'stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>';
  return a;
}

function render(){
  const t=I18N[LANG];
  document.documentElement.lang=t.htmlLang;
  document.title=t.title;
  $("mark").textContent="a";
  $("pName").textContent="appshin";
  $("pTag").textContent=t.tagline;
  $("footDev").textContent=t.footer;

  const liveApps=APPS.filter(Boolean);
  $("pCount").textContent=t.count(liveApps.length);
  $("videoCta").innerHTML='<span class="vi">🎬</span><span class="vt"><b>'+t.videoTitle+'</b><span>'+t.videoSub+'</span></span><span class="va">→</span>';

  const banner=$("osBanner");
  if(OS==="ios"){banner.classList.add("show");banner.innerHTML=t.iosBanner;}
  else banner.classList.remove("show");

  const list=$("list");list.innerHTML="";
  const featured=liveApps.filter((x)=>x.featured);
  const rest=liveApps.filter((x)=>!x.featured);
  if(featured.length){
    const lbl=document.createElement("div");lbl.className="section-label";lbl.textContent=t.featured;
    list.appendChild(lbl);
    featured.forEach((app)=>list.appendChild(makeCard(app,t)));
  }
  const seen=[];
  rest.forEach((app)=>{if(!seen.includes(app.cat))seen.push(app.cat);});
  seen.forEach((cat)=>{
    const lbl=document.createElement("div");lbl.className="section-label";lbl.textContent=t.cats[cat]||cat;
    list.appendChild(lbl);
    rest.filter((x)=>x.cat===cat).forEach((app)=>list.appendChild(makeCard(app,t)));
  });

  $("btnKo").classList.toggle("active",LANG==="ko");
  $("btnEn").classList.toggle("active",LANG==="en");

  if(visitCount!=null){
    $("visits").textContent=t.visits(visitCount);
    $("visits").hidden=false;
  }
}

function setLang(l){
  LANG=l;
  try{localStorage.setItem("lang",l);}catch(e){}
  render();
}
$("btnKo").addEventListener("click",()=>setLang("ko"));
$("btnEn").addEventListener("click",()=>setLang("en"));

render();

(async function(){
  try{
    const res=await fetch("https://androidshin.goatcounter.com/counter/TOTAL.json");
    if(!res.ok)return;
    const data=await res.json();
    const num=data.count_unique||data.count;
    if(num){visitCount=num;$("visits").textContent=I18N[LANG].visits(num);$("visits").hidden=false;}
  }catch(e){}
})();
</script>

<script data-goatcounter="https://androidshin.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
</body>
</html>
